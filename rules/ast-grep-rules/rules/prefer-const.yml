id: prefer-const
language: TypeScript
message: "Use 'const' instead of 'let' for variables that are never reassigned"
severity: warning
note: |
  Variables declared with 'let' that are never reassigned should use 'const'
  to signal immutability and prevent accidental reassignment.
rule:
  all:
    - pattern: let $X = $Y
    - not:
        any:
          - follows:
              pattern: $X = $$$
          - precedes:
              pattern: $X = $$$
