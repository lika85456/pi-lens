id: raw-strings
language: TypeScript
message: "Raw string literal — consider using a constant or enum"
severity: warning
note: |
  Using raw string literals in function calls or assignments can lead to errors and makes maintenance harder.
  Consider using a constant, enum, or string union type instead.
  Grade 2.5 — low complexity, improved consistency.
rule:
  all:
    - kind: string
    - pattern: $STR
    - regex: ^"([^ ]{3,})"|'([^ ]{3,})'$ # Only matches strings 3+ chars with no spaces (heuristic for constants/IDs)
    - any:
        - inside:
            kind: arguments
        - inside:
            kind: assignment_expression
  not:
    inside:
      any:
        - kind: lexical_declaration
        - kind: import_statement
        - kind: type_alias_declaration
        - kind: enum_declaration
        - kind: pair # Object keys: { "key": value }
        - pattern: console.log($$$)
        - pattern: console.error($$$)
        - pattern: console.warn($$$)
        - pattern: console.info($$$)
        - pattern: console.debug($$$)
        - pattern: describe($$$)
        - pattern: it($$$)
        - pattern: test($$$)
        - pattern: expect($$$)
        - pattern: beforeEach($$$)
        - pattern: afterEach($$$)
        - pattern: beforeAll($$$)
        - pattern: afterAll($$$)
